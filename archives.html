---
layout: default
title: Archives
---

<div class="post">
  <h2>The Archives</h2>

  <ul class="archivelist">
    {% for post in site.posts %}
      <li>
        <span class="archivedate">{{ post.date | date: "%b %e, %Y" }}</span>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
