---
layout: default
title: Categories
---

<div class="post">
  <h2>Categories</h2>

  <ul class="archivelist">
    {% assign cats = site.categories | sort %}
    {% for cat in cats %}
      {% assign name = cat[0] %}
      <li>
        <a href="{{ '/category/' | append: name | append: '/' | relative_url }}">{{ name }}</a>
        ({{ cat[1].size }})
      </li>
    {% endfor %}
  </ul>
</div>
