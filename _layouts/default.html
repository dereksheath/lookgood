<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
  <title>{{ site.title }}{% if page.title %} : {{ page.title }}{% endif %}</title>
  {% include head.html %}
</head>

<body>
  <div id="wrapper">

    <div id="header">
      <div id="brand">{{ site.title }}</div>
      <div id="tagline">“{{ site.tagline }}”</div>
    </div>

    <div id="main">
      <div id="sidebar">
        {% include sidebar.html %}
      </div>

      <div id="content">
        {{ content }}
      </div>
    </div>

    <div class="footer">
      © {{ site.time | date: "%Y" }} {{ site.title }} · Powered by The Scene 3.2
    </div>

  </div>
</body>
</html>
